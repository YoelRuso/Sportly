<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario - MatchAlert</title>

  <script src="../../app.js"></script>
  <link rel="stylesheet" href="../../../public/style.css">
  <link rel="stylesheet" href="calendario.css">
</head>
<body style="background-color: #0f0f0f;">

<div id="header"></div>

<main class="calendar-wrapper">
  <header class="calendar-header-section">
    <h1 class="calendar-title">Calendario de Eventos</h1>

    <nav class="center-items-row">
      <ul class="nav-selectionar-tiempo">
        <li><a href="#" class="nav-arrow">&lt;</a></li>
        <li class="time-display">Febrero</li>
        <li><a href="#" class="nav-arrow">&gt;</a></li>
      </ul>
      <ul class="nav-selectionar-tiempo">
        <li><a href="#" class="nav-arrow">&lt;</a></li>
        <li class="time-display">2026</li>
        <li><a href="#" class="nav-arrow">&gt;</a></li>
      </ul>
    </nav>
  </header>

  <table id="calendar">
    <thead>
    <tr>
      <th>Lun</th>
      <th>Mar</th>
      <th>Mié</th>
      <th>Jue</th>
      <th>Vie</th>
      <th>Sáb</th>
      <th>Dom</th>
    </tr>
    </thead>
    <tbody>
    </tbody>
  </table>

  <div id="info" class="calendar-info-box"></div>
</main>

<footer id="footer"></footer>

<script src="calendario.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', initCalendario);
</script>
</body>
</html>
