<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Perfil de Usuario</title>
  <link rel="stylesheet" href="gestion-usuario.css" />
</head>
<body>
<div class="dashboard">
  <!-- PANEL IZQUIERDO -->
  <div class="profile-section">
    <div class="profile-image">
      <img
        src="https://via.placeholder.com/150"
        alt="Foto de perfil"
      />
    </div>

    <button class="change-photo">Cambiar Foto</button>

    <div class="user-info">
      <p><strong>Email:</strong> usuario@gmail.com</p>
      <p><strong>Rol:</strong> Usuario</p>
      <p><strong>ID:</strong> #002</p>
    </div>
  </div>

  <!-- PANEL DERECHO -->
  <div class="favorites-section">
    <h2>Partidos Favoritos</h2>

    <div class="match-list">
      <div class="match-item">
        <span>Real Madrid vs FC Barcelona</span>
        <span class="date">15 Marzo 2026</span>
      </div>

      <div class="match-item">
        <span>Los Angeles Lakers vs Golden State Warriors</span>
        <span class="date">20 Marzo 2026</span>
      </div>

      <div class="match-item">
        <span>Manchester City vs Liverpool FC</span>
        <span class="date">2 Abril 2026</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
