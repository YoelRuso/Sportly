<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión / Registro – Sportly</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

<section class="auth-box">

  <!-- Tabs -->
  <div class="auth-tabs" role="tablist">
    <button id="tab-login"    class="tab active" role="tab" onclick="showTab('login')">Iniciar Sesión</button>
    <button id="tab-register" class="tab"         role="tab" onclick="showTab('register')">Registrarse</button>
  </div>

  <!-- ── LOGIN FORM ─────────────────────────────────────────────── -->
  <div id="panel-login" class="auth-panel">
    <h1>Bienvenido a Sportly</h1>

    <div id="login-error" class="form-error" style="display:none;" role="alert"></div>

    <form id="loginForm" novalidate>

      <div class="field-group">
        <label for="loginUser">Usuario</label>
        <input
          type="text"
          id="loginUser"
          name="username"
          placeholder="Tu nombre de usuario"
          autocomplete="username"
          required
          minlength="3"
          maxlength="50"
        >
        <span class="field-hint">Mínimo 3 caracteres.</span>
      </div>

      <div class="field-group">
        <label for="loginPass">Contraseña</label>
        <input
          type="password"
          id="loginPass"
          name="password"
          placeholder="Tu contraseña"
          autocomplete="current-password"
          required
          minlength="4"
        >
        <span class="field-hint">Mínimo 4 caracteres.</span>
      </div>

      <div class="options">
        <label class="remember-label">
          <input type="checkbox" id="remember" name="remember">
          Recordarme
        </label>
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-primary">Entrar</button>
    </form>
  </div>

  <!-- ── REGISTER FORM ─────────────────────────────────────────── -->
  <div id="panel-register" class="auth-panel" style="display:none;">
    <h1>Crear cuenta</h1>

    <div id="register-error"   class="form-error"   style="display:none;" role="alert"></div>
    <div id="register-success" class="form-success" style="display:none;" role="status"></div>

    <form id="registerForm" novalidate>

      <div class="field-group">
        <label for="regUser">Usuario</label>
        <input
          type="text"
          id="regUser"
          name="username"
          placeholder="Elige un nombre de usuario"
          autocomplete="username"
          required
          minlength="3"
          maxlength="50"
          pattern="[A-Za-z0-9_]+"
          title="Solo letras, números y guión bajo"
        >
        <span class="field-hint">3-50 caracteres (letras, números, _).</span>
      </div>

      <div class="field-group">
        <label for="regEmail">Correo electrónico</label>
        <input
          type="email"
          id="regEmail"
          name="email"
          placeholder="tu@correo.com"
          autocomplete="email"
          required
        >
      </div>

      <div class="field-group">
        <label for="regPass">Contraseña</label>
        <input
          type="password"
          id="regPass"
          name="password"
          placeholder="Crea una contraseña"
          autocomplete="new-password"
          required
          minlength="6"
          maxlength="100"
        >
        <span class="field-hint">Mínimo 6 caracteres.</span>
      </div>

      <div class="field-group">
        <label for="regPassConfirm">Confirmar contraseña</label>
        <input
          type="password"
          id="regPassConfirm"
          name="passwordConfirm"
          placeholder="Repite la contraseña"
          autocomplete="new-password"
          required
          minlength="6"
        >
      </div>

      <button type="submit" class="btn-primary">Registrarse</button>
    </form>
  </div>

</section>

<script src="../../js/app.js"></script>
<script src="login.js"></script>

</body>
</html>
