<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Información del Partido</title>
  <link rel="stylesheet" href="card-resumen-popup.css" />
</head>
<body>
<main class="container">
  <div class="match-card">
    <!-- Equipo 1 -->
    <div class="team team-left">
      <h2>Real Madrid</h2>
      <p class="coach">Entrenador: Carlo Ancelotti</p>
      <h3>Jugadores Clave:</h3>
      <ul>
        <li>Vinícius Jr.</li>
        <li>Jude Bellingham</li>
        <li>Luka Modrić</li>
      </ul>
    </div>

    <!-- Centro -->
    <div class="match-center">
      <h2>VS</h2>
      <p class="stadium">Estadio Santiago Bernabéu</p>
      <p class="date">Fecha: 15 Marzo 2026</p>
      <p class="time">Hora: 21:00</p>
    </div>

    <!-- Equipo 2 -->
    <div class="team team-right">
      <h2>FC Barcelona</h2>
      <p class="coach">Entrenador: Xavi Hernández</p>
      <h3>Jugadores Clave:</h3>
      <ul>
        <li>Robert Lewandowski</li>
        <li>Pedri</li>
        <li>Frenkie de Jong</li>
      </ul>
    </div>
  </div>
</main>
</body>
</html>
